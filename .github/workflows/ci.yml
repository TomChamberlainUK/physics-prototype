name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install
        uses: ./.github/workflows/scripts/install
      - name: Run Lint
        run: pnpm run lint
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install
        uses: ./.github/workflows/scripts/install
      - name: Run Typecheck
        run: pnpm run typecheck
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install
        uses: ./.github/workflows/scripts/install
      - name: Run Tests
        run: pnpm run test
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v5
      - name: Install
        uses: ./.github/workflows/scripts/install
      - name: Run Build
        run: pnpm run build
